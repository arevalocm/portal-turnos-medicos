<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Turnos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f0ee;color:#1a1917;font-size:14px}
.topbar{background:#1a1917;color:#fff;padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:50px}
.topbar-title{font-size:14px;font-weight:bold}
.main{padding:1.25rem;max-width:1100px;margin:0 auto}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem}
.stat-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1rem}
.stat-num{font-size:26px;font-weight:bold}
.stat-label{font-size:12px;color:#666;margin-top:2px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;margin-bottom:1rem;overflow:hidden}
.card-header{padding:.875rem 1.25rem;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:bold}
.tbl-wrap{overflow-x:auto;max-height:480px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:bold;color:#666;padding:7px 10px;border-bottom:1px solid #ddd;background:#fff;position:sticky;top:0;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#f9f9f7}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold}
.b-urg{background:#fcecea;color:#7a1f16}
.b-prog{background:#e8f0fb;color:#0f3a72}
.b-int{background:#fdf3e3;color:#6b3d00}
.b-sin{background:#f0f0ee;color:#555}
.b-ok{background:#e6f5ed;color:#0f4f2e}
.b-m0{background:#e3f5f2;color:#084f46}
.b-m1{background:#fdf3e3;color:#6b3d00}
.b-m2{background:#e8f0fb;color:#0f3a72}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:5px;border:1px solid #ccc;background:#fff;font-size:12px;cursor:pointer;font-family:Arial,sans-serif}
.btn:hover{background:#f0f0ee}
.btn-primary{background:#1a56a0;color:#fff;border-color:#1a56a0}
.btn-primary:hover{background:#0f3a72}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-informar{background:#1a56a0;color:#fff;border:none;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif}
.btn-informar:hover{background:#0f3a72}
.btn-listo{background:#e6f5ed;color:#0f4f2e;border:1px solid #a8d5be;padding:5px 10px;font-size:11px;font-weight:bold;border-radius:5px;cursor:pointer;font-family:Arial,sans-serif}
select,input{padding:6px 10px;border-radius:5px;border:1px solid #ccc;font-size:13px;font-family:Arial,sans-serif}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0ee}
.login-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:2.5rem;width:350px}
.login-title{font-size:20px;font-weight:bold;margin-bottom:4px}
.login-sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:bold;color:#666;text-transform:uppercase;margin-bottom:5px}
.field select,.field input{width:100%}
.pin-row{display:flex;gap:10px}
.pin-box{width:58px;height:52px;border-radius:5px;border:1px solid #ccc;font-size:22px;font-weight:bold;text-align:center;font-family:Arial,sans-serif}
.pin-box:focus{outline:none;border-color:#1a56a0;box-shadow:0 0 0 3px rgba(26,86,160,.15)}
.err{font-size:12px;color:#c0392b;text-align:center;min-height:18px;margin-top:6px}
.btn-login{width:100%;padding:11px;border-radius:5px;border:none;background:#1a1917;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif;margin-top:.5rem}
.btn-login:hover{background:#333}
.nav-tabs{display:flex;gap:4px;margin-bottom:1.25rem}
.nav-tab{padding:6px 16px;border-radius:5px;font-size:13px;cursor:pointer;color:#666;background:transparent;border:none;font-family:Arial,sans-serif}
.nav-tab.active{background:#fff;border:1px solid #ddd;color:#1a1917;font-weight:bold}
.nav-tab:hover{background:#e8e8e5}
.empty{text-align:center;padding:3rem;color:#999;font-size:13px}
.progress{height:5px;background:#f0f0ee;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;background:#1a7a4a;border-radius:3px}
.sel-inline{padding:3px 8px;font-size:12px;border-radius:4px;border:1px solid #ccc;font-family:Arial,sans-serif}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;padding:1.25rem}
.form-actions{padding:0 1.25rem 1.25rem;display:flex;gap:8px;align-items:center}
.msg-ok{font-size:12px;color:#1a7a4a;padding:6px 12px;background:#e6f5ed;border-radius:4px}
.msg-err{font-size:12px;color:#c0392b;padding:6px 12px;background:#fcecea;border-radius:4px}
.banner{background:#e8f0fb;border:1px solid #b5d0f0;border-radius:5px;padding:.7rem 1rem;font-size:12px;color:#0f3a72;margin-bottom:1rem}
.banner-sync{background:#e6f5ed;border:1px solid #a8d5be;border-radius:5px;padding:.5rem 1rem;font-size:12px;color:#0f4f2e;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.btn-logout{padding:5px 12px;border-radius:5px;border:1px solid #444;background:transparent;color:#ccc;font-size:12px;cursor:pointer;font-family:Arial,sans-serif}
.btn-logout:hover{background:#333;color:#fff}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;flex-shrink:0}
.av-admin{background:#e8f0fb;color:#0f3a72}
.av0{background:#e3f5f2;color:#084f46}
.av1{background:#fdf3e3;color:#6b3d00}
.av2{background:#e8f0fb;color:#0f3a72}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0ee;flex-direction:column;gap:12px;color:#666;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#1a56a0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dot-live{display:inline-block;width:8px;height:8px;background:#1a7a4a;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

// ── Estado global ───────────────────────────────────────────────────────────
var currentUser = null;
var pacientes = [];
var asignaciones = {};
var overrides = {};
var estadoMap = {}; // orden -> 'informado'
var unsubscribe = null;

// ── Firebase helpers ────────────────────────────────────────────────────────
const DOC_ASIG = doc(db, 'portal', 'asignaciones');
const DOC_OVER = doc(db, 'portal', 'overrides');
const DOC_ESTADO = doc(db, 'portal', 'estados');
const DOC_PACS = doc(db, 'portal', 'pacientes_extra');

// Cuotas mensuales de códigos por médico
var CUOTAS={ortega:300, medina:150};

function diasEnMes(yy, mm){
  // yy: 2 dígitos (ej "26"), mm: 2 dígitos (ej "04")
  return new Date(2000+parseInt(yy), parseInt(mm), 0).getDate();
}

function parseFecha(fecha){
  // fecha formato DD/MM/YY → {dd, mm, yy}
  var p=fecha.split('/');
  return {dd:parseInt(p[0]),mm:p[1],yy:p[2]};
}

function esMismoMes(fecha, mm, yy){
  var f=parseFecha(fecha);
  return f.mm===mm && f.yy===yy;
}

function autoAsignar(pacs){
  var a={};

  // Mes y año actuales
  var hoy=new Date();
  var mmHoy=String(hoy.getMonth()+1).padStart(2,'0');
  var yyHoy=String(hoy.getFullYear()).slice(2);
  var diaHoy=hoy.getDate();
  var totalDias=diasEnMes(yyHoy, mmHoy);

  // Ritmo esperado proporcional al día de hoy (fracción de cuota que deberían llevar)
  // Ej: día 10 de 30 → deberían llevar 1/3 de su cuota
  var fraccion=diaHoy/totalDias;

  // Contar acumulado del mes actual usando asignaciones ya existentes
  var acum={ortega:0, medina:0, arevalo:0};
  pacientes.forEach(function(p){
    var med=asignaciones&&asignaciones[p.orden];
    if(med && acum[med]!==undefined && esMismoMes(p.fecha, mmHoy, yyHoy)){
      acum[med]+=(p.codigos?p.codigos.length:0);
    }
  });

  pacs.forEach(function(p){
    var s=(p.servicio||'').toUpperCase();
    var rm=s.indexOf('IRM')>=0||s.indexOf('RESONAN')>=0||s.indexOf('RESONADOR')>=0;
    if(rm){
      a[p.orden]='medina';
      if(esMismoMes(p.fecha, mmHoy, yyHoy)) acum.medina+=(p.codigos?p.codigos.length:0);
      return;
    }

    var nCods=p.codigos?p.codigos.length:1;

    // Proporción usada = acumulado / cuota total
    // El que tenga menor proporción usada está más atrasado → recibe el próximo estudio
    // Esto compara en términos relativos: Ortega con 100/300 = 33% y Medina con 40/150 = 27%
    // → le toca a Medina porque está más atrasado proporcionalmente
    var propOrtega = acum.ortega < CUOTAS.ortega ? acum.ortega / CUOTAS.ortega : Infinity;
    var propMedina = acum.medina < CUOTAS.medina ? acum.medina / CUOTAS.medina : Infinity;
    // Arévalo recibe solo cuando ambos llegaron a su cuota
    var propArevalo = (propOrtega === Infinity && propMedina === Infinity) ? 0 : Infinity;

    var elegido;
    if(propArevalo === 0){
      elegido='arevalo';
    } else if(propOrtega <= propMedina){
      elegido='ortega';
    } else {
      elegido='medina';
    }

    a[p.orden]=elegido;
    if(esMismoMes(p.fecha, mmHoy, yyHoy)) acum[elegido]+=nCods;
  });
  return a;
}

async function loadFromFirebase(){
  // Cargar asignaciones
  try {
    const snapA = await getDoc(DOC_ASIG);
    asignaciones = snapA.exists() ? snapA.data() : {};
  } catch(e){ asignaciones={}; }

  // Cargar overrides
  try {
    const snapO = await getDoc(DOC_OVER);
    overrides = snapO.exists() ? snapO.data() : {};
  } catch(e){ overrides={}; }

  // Cargar estados
  try {
    const snapE = await getDoc(DOC_ESTADO);
    estadoMap = snapE.exists() ? snapE.data() : {};
  } catch(e){ estadoMap={}; }

  // Cargar pacientes extra
  try {
    const snapP = await getDoc(DOC_PACS);
    var extra = snapP.exists() ? (snapP.data().lista || []) : [];
    pacientes = PACS_DEFAULT.slice();
    // Agregar extras que no estén ya en el default
    var ordenes = new Set(pacientes.map(p=>p.orden));
    extra.forEach(function(p){ if(!ordenes.has(p.orden)) pacientes.push(p); });
  } catch(e){ pacientes = PACS_DEFAULT.slice(); }

  // Aplicar estados a pacientes
  pacientes.forEach(function(p){
    p.estado = estadoMap[p.orden] || '';
  });

  // Auto-asignar los que no tienen asignación
  var auto = autoAsignar(pacientes);
  pacientes.forEach(function(p){
    if(!asignaciones[p.orden]) asignaciones[p.orden] = auto[p.orden];
  });
  // Aplicar overrides
  Object.keys(overrides).forEach(function(k){ asignaciones[k]=overrides[k]; });
}

async function saveAsignaciones(){
  try { await setDoc(DOC_ASIG, asignaciones); } catch(e){ console.error('Error guardando asignaciones',e); }
}
async function saveOverrides(){
  try { await setDoc(DOC_OVER, overrides); } catch(e){ console.error('Error guardando overrides',e); }
}
async function saveEstado(orden, estado){
  estadoMap[orden] = estado;
  try { await setDoc(DOC_ESTADO, estadoMap); } catch(e){ console.error('Error guardando estado',e); }
}
async function savePacientesExtra(){
  var extra = pacientes.filter(p => !PACS_DEFAULT.find(d=>d.orden===p.orden));
  try { await setDoc(DOC_PACS, {lista: extra}); } catch(e){ console.error('Error guardando pacientes',e); }
}

// Listener en tiempo real — cuando Firebase cambia, re-renderiza
function startLiveSync(){
  if(unsubscribe) unsubscribe();
  // Escuchar cambios en el documento de estados
  unsubscribe = onSnapshot(DOC_ESTADO, function(snap){
    if(!snap.exists()) return;
    var newEstados = snap.data();
    var changed = false;
    pacientes.forEach(function(p){
      var newE = newEstados[p.orden]||'';
      if(p.estado !== newE){ p.estado=newE; changed=true; }
    });
    estadoMap = newEstados;
    if(changed && currentUser){
      if(UROLES[currentUser].rol==='admin') renderAdmin(currentAdminTab);
      else renderMedico();
    }
  });
}

  var u=document.getElementById('usr').value;

  overrides[orden]=medId;
  renderAdmin('estudios');
  await saveAsignaciones();
  await saveOverrides();
}

async function reaplicar(){
  var auto=autoAsignar(pacientes);
  Object.keys(auto).forEach(function(k){asignaciones[k]=auto[k];});
  Object.keys(overrides).forEach(function(k){asignaciones[k]=overrides[k];});
  renderAdmin('estudios');
  await saveAsignaciones();
}

async function guardar(){
  var orden=document.getElementById('fo').value.trim();
  var msg=document.getElementById('msg');
  if(!orden){msg.innerHTML='<span class="msg-err">El Nº de Orden es obligatorio</span>';return;}
  if(pacientes.filter(function(p){return p.orden===orden;}).length>0){msg.innerHTML='<span class="msg-err">Ya existe ese Nº de Orden</span>';return;}
  var fv=document.getElementById('ff').value,fd=fv;
  if(fv){var parts=fv.split('-');fd=parts[2]+'/'+parts[1]+'/'+parts[0].slice(2);}
  var med=document.getElementById('fm').value;
  var nuevo={orden:orden,fecha:fd,nombre:document.getElementById('fn').value||'—',servicio:document.getElementById('fs').value||'',atencion:document.getElementById('fa').value||''};
  pacientes.push(nuevo);
  var autoA=autoAsignar([nuevo]);
  asignaciones[orden]=med||autoA[orden];
  msg.innerHTML='<span class="msg-ok">Guardando...</span>';
  await savePacientesExtra();
  await saveAsignaciones();
  msg.innerHTML='<span class="msg-ok">✓ Guardado y sincronizado</span>';
  setTimeout(function(){renderAdmin('estudios');},900);
}

// ── Médico ───────────────────────────────────────────────────────────────────
function liquidacionMedico(medId){
  var meses={};
  pacientes.forEach(function(p){
    if(estadoMap[p.orden]==='informado' && asignaciones[p.orden]===medId){
      var parts=p.fecha.split('/');
      var mk=parts[1]+'/20'+parts[2];
      if(!meses[mk])meses[mk]={e:0,c:0};
      meses[mk].e++;
      meses[mk].c+=(p.codigos?p.codigos.length:0);
    }
  });
  var mks=Object.keys(meses).sort();
  if(mks.length===0)return '';
  var h='<div class="card" style="margin-bottom:1rem"><div class="card-header"><span class="card-title">Mis códigos informados</span></div><div style="display:flex;gap:1rem;padding:1rem;flex-wrap:wrap">';
  mks.forEach(function(mk){
    var d=meses[mk];
    h+='<div class="stat-card" style="flex:1;min-width:140px"><div class="stat-num" style="color:#1a7a4a">'+d.c+'</div><div class="stat-label">códigos en '+mk+'</div><div style="font-size:11px;color:#999;margin-top:4px">'+d.e+' estudios informados</div></div>';
  });
  h+='</div></div>';
  return h;
}

function renderMedico(){
  var u=UROLES[currentUser];
  var med=MEDICOS[u.idx];
  var mis=pacientes.filter(function(p){return asignaciones[p.orden]===med.id;});
  var pend=mis.filter(function(p){return p.estado!=='informado';}).length;
  var rows='';
  mis.forEach(function(p){
    rows+='<tr><td><b>'+p.orden+'</b></td><td style="color:#666">'+p.fecha+'</td><td>'+p.nombre+'</td><td style="color:#666;font-size:12px">'+p.servicio+'</td><td style="text-align:center"><span class="badge b-sin">'+(p.codigos?p.codigos.length:0)+'</span></td><td>'+ab(p.atencion)+'</td><td>'+(p.estado==='informado'?'<span class="badge b-ok">Informado</span>':'<span class="badge b-sin">Pendiente</span>')+'</td><td style="display:flex;gap:6px;align-items:center">'+(p.estado!=='informado'?'<button class="btn-informar" onclick="abrirInformar(\''+p.orden+'\')">+ Informar</button>':'<span style="font-size:12px;color:#1a7a4a">Completado</span>')+'</td></tr>';
  });
  document.getElementById('root').innerHTML=topbar(med.nombre,med.ini,med.av)+
  '<div class="main">'+syncBanner()+'<div class="banner">Hacé clic en <b>+ Informar</b> para abrir el estudio. Al cerrar la ventana del RIS se te preguntará si ya lo informaste.</div>'+
  '<div class="grid3"><div class="stat-card"><div class="stat-num">'+mis.length+'</div><div class="stat-label">estudios asignados</div></div><div class="stat-card"><div class="stat-num" style="color:#c0392b">'+pend+'</div><div class="stat-label">pendientes</div></div><div class="stat-card"><div class="stat-num" style="color:#1a7a4a">'+(mis.length-pend)+'liquidacionMedico(med.id)+</div><div class="stat-label">informados</div></div></div>'+
  '<div class="card"><div class="card-header"><span class="card-title">Mis estudios asignados</span></div>'+(mis.length===0?'<div class="empty">No tenés estudios asignados.<br>Consultá con el administrador.</div>':'<div class="tbl-wrap"><table><thead><tr><th>Orden</th><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Reg.</th><th>Atención</th><th>Estado</th><th>Acción</th></tr></thead><tbody>'+rows+'</tbody></table></div>')+'</div></div>';
}

async function marcar(orden){
  var p=pacientes.filter(function(x){return x.orden===orden;})[0];
  if(p) p.estado='informado';
  renderMedico();
  await saveEstado(orden,'informado');
}

function logout(){
  currentUser=null;
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  renderLogin();
}

function abrirInformar(orden){
  var url=BASE+orden+'/';
  var w=window.open(url,'_blank','width=1200,height=850,scrollbars=yes');
  if(!w){window.open(url,'_blank');return;}
  // Detectar cuando el médico cierra la ventana del RIS
  var check=setInterval(async function(){
    if(w.closed){
      clearInterval(check);
      // Mostrar diálogo de confirmación
      var p=pacientes.filter(function(x){return x.orden===orden;})[0];
      var nombre=p?p.nombre:'este estudio';
      // Crear modal de confirmación
      var overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
      overlay.innerHTML='<div style="background:#fff;border-radius:10px;padding:2rem;max-width:420px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.3)">'+
        '<div style="font-size:15px;font-weight:bold;margin-bottom:8px">¿Terminaste el informe?</div>'+
        '<div style="font-size:13px;color:#666;margin-bottom:1.5rem"><b>'+nombre+'</b><br>Si cerraste sin informar, hacé clic en <b>No</b>.</div>'+
        '<div style="display:flex;gap:10px">'+
        '<button id="btn-si" style="flex:1;padding:10px;background:#1a7a4a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer">✓ Sí, ya lo informé</button>'+
        '<button id="btn-no" style="flex:1;padding:10px;background:#f0f0ee;color:#333;border:1px solid #ccc;border-radius:6px;font-size:14px;cursor:pointer">No, volver a la lista</button>'+
        '</div></div>';
      document.body.appendChild(overlay);
      document.getElementById('btn-si').onclick=async function(){
        document.body.removeChild(overlay);
        pacientes=pacientes.filter(function(x){return x.orden!==orden;});
        await saveEstado(orden,'informado');
        if(currentUser&&UROLES[currentUser].rol==='admin') renderAdmin(currentAdminTab);
        else if(currentUser) renderMedico();
      };
      document.getElementById('btn-no').onclick=function(){
        document.body.removeChild(overlay);
      };
    }
  },1000);
}

// ── Exponer funciones globales ───────────────────────────────────────────────
window.doLogin=doLogin;
window.pi=pi;
window.pk=pk;
window.logout=logout;
window.renderAdmin=renderAdmin;
window.reasignar=reasignar;
window.reaplicar=reaplicar;
window.guardar=guardar;
window.marcar=marcar;
window.abrirInformar=abrirInformar;

// ── Iniciar ──────────────────────────────────────────────────────────────────
renderLogin();
</script>
</body>
</html>
